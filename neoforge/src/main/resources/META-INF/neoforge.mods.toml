modLoader = "javafml"
loaderVersion = "[4,)"
#issueTrackerURL = ""
license = "${license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${author}"
description = '''
A mod that helps visually impaired players to play Minecraft.
'''
#logoFile = ""

[[dependencies.cobbleutils]]
modId = "neoforge"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.cobbleutils]]
modId = "minecraft"
versionRange = "[1.21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.cobbleutils]]
modId = "cobblemon"
type = "required"
versionRange = "[1.6,)"
ordering = "AFTER"
side = "BOTH"

[[mixins]]
config = "cobbleutils.mixins.json"